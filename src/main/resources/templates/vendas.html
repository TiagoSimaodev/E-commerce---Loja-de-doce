<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Vendas Realizadas</h1>
        <a href="/" class="btn btn-secondary">Voltar</a>
        <table class="table">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Total</th>
                    <th>Método de Pagamento</th>
                    <th>Itens</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="venda : ${vendas}">
                    <td th:text="${#temporals.format(venda.data, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${venda.total}"></td>
                    <td th:text="${venda.metodoPagamento}"></td>
                    <td>
                        <ul>
                            <li th:each="item : ${venda.itens}" th:text="${item.produto.nome} + ' x' + ${item.quantidade}"></li>
                        </ul>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
