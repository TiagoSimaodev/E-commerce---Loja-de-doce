<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Carrinho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-birthday-cake"></i> Doceria Delícia</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="#doces">Doces</a></li>
                    <li class="nav-item"><a class="nav-link" href="#bolos">Bolos</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item position-relative">
                        <a class="nav-link" href="/carrinho"><i class="fas fa-shopping-cart"></i> Carrinho
                            <span id="cart-count" class="badge bg-secondary" th:text="${cartCount}">0</span>
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-3">
                    <li class="nav-item"><a class="nav-link" href="mailto:contato@doceria.com"><i class="fas fa-envelope"></i> contato@doceria.com</a></li>
                    <li class="nav-item"><a class="nav-link" href="https://wa.me/5511999999999"><i class="fab fa-whatsapp"></i> WhatsApp</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h1>Carrinho de Compras</h1>
        <a href="/" class="btn btn-secondary mb-3">Continuar Comprando</a>
        <div th:if="${#lists.size(carrinho) > 0}">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Quantidade</th>
                        <th>Preço Unitário</th>
                        <th>Total</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${carrinho}">
                        <td th:text="${item.produto.nome}"></td>
                        <td th:text="${item.quantidade}"></td>
                        <td>R$ <span th:text="${item.produto.preco}"></span></td>
                        <td>R$ <span th:text="${item.produto.preco * item.quantidade}"></span></td>
                        <td>
                            <form action="/carrinho/remover" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <input type="hidden" name="produtoId" th:value="${item.produto.id}" />
                                <button class="btn btn-danger btn-sm">Remover</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <th colspan="3" class="text-end">Total:</th>
                        <th colspan="2">R$ <span th:text="${total}"></span></th>
                    </tr>
                </tfoot>
            </table>
            <a href="/carrinho/finalizar" class="btn btn-success">Finalizar Compra</a>
        </div>
        <p th:if="${#lists.size(carrinho) == 0}">Carrinho vazio.</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
