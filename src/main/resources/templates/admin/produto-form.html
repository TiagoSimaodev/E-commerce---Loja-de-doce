<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Produto - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/admin">Painel Admin</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 th:text="${produto.id != null} ? 'Editar Produto' : 'Novo Produto'"></h1>
        <form th:action="${produto.id != null} ? @{/admin/produtos} : @{/admin/produtos}" method="post" th:object="${produto}" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}" />
            <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nome" th:field="*{nome}" required>
            </div>
            <div class="mb-3">
                <label for="descricao" class="form-label">Descrição</label>
                <textarea class="form-control" id="descricao" th:field="*{descricao}" required></textarea>
            </div>
            <div class="mb-3">
                <label for="preco" class="form-label">Preço</label>
                <input type="number" step="0.01" class="form-control" id="preco" th:field="*{preco}" required>
            </div>
            <div class="mb-3">
                <label for="categoria" class="form-label">Categoria</label>
                <select class="form-control" id="categoria" th:field="*{categoria}" required>
                    <option value="doce">Doce</option>
                    <option value="bolo">Bolo</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="imagemUrl" class="form-label">URL da Imagem</label>
                <input type="url" class="form-control" id="imagemUrl" th:field="*{imagemUrl}">
            </div>
            <div class="mb-3">
                <label for="imagemFile" class="form-label">Upload de Imagem</label>
                <input type="file" class="form-control" id="imagemFile" name="imagemFile" accept="image/*">
                <small class="form-text text-muted">Se selecionar um arquivo, ele será usado em vez da URL.</small>
            </div>
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="/admin" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
